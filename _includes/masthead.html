{% comment %}
  Custom Masthead — replaces the theme’s default header
{% endcomment %}

<header id="site-header" class="header--expanded" role="banner">
  <div class="container header__content">
    <a href="{{ '/' | relative_url }}" class="header__logo">{{ site.title }}</a>
    <nav id="main-nav" class="header__nav">
      <ul>
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a href="{{ '/blog/' | relative_url }}">Blog</a></li>
        <li><a href="{{ '/projects/' | relative_url }}">Projects</a></li>
      </ul>
    </nav>
    <button id="nav-toggle" class="header__toggle" aria-label="Toggle navigation">
      <span class="hamburger"></span>
    </button>
  </div>
</header>
